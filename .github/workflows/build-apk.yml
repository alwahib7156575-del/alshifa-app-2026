name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Capacitor
        run: |
          rm -f package-lock.json
          npm install
          npm install @capacitor/core@7 @capacitor/android@7 @capacitor/cli@7

      - name: Verify Capacitor
        run: npx --yes --package @capacitor/cli@7 cap --version

      - name: Create Android project
        run: npx --yes --package @capacitor/cli@7 cap add android

      - name: Sync web files
        run: npx --yes --package @capacitor/cli@7 cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alshifa-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk